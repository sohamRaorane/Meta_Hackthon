name: mumbai-lastmile-crisis-response
version: "1.0"
description: >
  Mumbai Last-Mile Crisis Response Environment.
  An AI agent must navigate multi-leg Mumbai commutes under
  partial information, weather disruptions, and budget/time constraints.

author: Soham Raorane, Om Patil, Soumil Sethna

benchmark: mumbai-lastmile

server:
  host: "0.0.0.0"
  port: 7860
  start_command: "python -m uvicorn server.app:app --host 0.0.0.0 --port 7860"

tasks:
  - name: easy
    description: "2-leg journey Andheri→Kurla, clear weather, 60min, ₹120 budget"
    seed: 42
    max_steps: 4

  - name: medium
    description: "3-leg journey Borivali→CST, heavy rain, 90min, ₹80 budget, mid-journey event"
    seed: 7
    max_steps: 5

  - name: hard
    description: "4-leg journey Churchgate→BKC, cascading failures, 85min, ₹75 budget"
    seed: 13
    max_steps: 6

  - name: bonus
    description: "2-leg journey Bandra→Juhu, light rain, 40min, ₹30 budget crisis"
    seed: 99
    max_steps: 4

action_type: text_message

reward:
  min: -1.0
  max: 1.5

score:
  min: 0.0
  max: 1.0