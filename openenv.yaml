# openenv.yaml
# ──────────────────────────────────────────────────────────────
# Metadata file for the OpenEnv hackathon validator.
# This tells the validator everything it needs to know about
# your environment.
# ──────────────────────────────────────────────────────────────

name: mumbai-lastmile-crisis-response
version: "1.0"
description: >
  Mumbai Last-Mile Crisis Response Environment.
  An AI agent must choose optimal transport modes under 
  partial information, weather disruptions, and budget/time constraints.

author: Soham Raorane, Om Patil and Soumil Sethna

# Where the server runs
server:
  host: "0.0.0.0"
  port: 8000
  start_command: "python -m uvicorn server.app:app --host 0.0.0.0 --port 8000"

# The 3 tasks the validator will test
tasks:
  - name: easy
    description: "Andheri East to Kurla, clear weather, 45 min, ₹100 budget"
    seed: 42
    max_steps: 3

  - name: medium
    description: "Andheri East to Kurla, heavy rain, 40 min, ₹80 budget, uncertain sensors"
    seed: 7
    max_steps: 3

  - name: hard
    description: "Borivali to CST, heavy rain + signal failure, 75 min, ₹80 budget, mid-journey event"
    seed: 13
    max_steps: 4

# What action type the environment expects
action_type: text_message

# Reward range
reward:
  min: -1.0
  max: 1.5